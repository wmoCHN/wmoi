<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to WMOI About</title>
    <meta http-equiv="refresh" content="0; url=./about.html" />
    <link rel="canonical" href="http://www.wmoi.org/pages/about.html" />
    <script>
      (function () {
        var target = new URL("./about.html", window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="./about.html">About</a>...</p>
  </body>
</html>
