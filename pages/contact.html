    <script>
      // 按「URL ?lang → 本地偏好 → 浏览器语言」选定语言,只加载对应语言的内容文件
      (function () {
        var SUPPORTED = ["en", "zh", "ja", "ko", "th", "fr", "es"];
        function pick() {
          try {
            var fromUrl = String(new URLSearchParams(location.search).get("lang") || "").toLowerCase();
            if (SUPPORTED.indexOf(fromUrl) >= 0) return fromUrl;
          } catch (_) {}
          try {
            var stored = localStorage.getItem("wmoi-lang") || "";
            if (SUPPORTED.indexOf(stored) >= 0) return stored;
          } catch (_) {}
          var navLangs = navigator.languages || [navigator.language];
          for (var i = 0; i < navLangs.length; i++) {
            var norm = String(navLangs[i] || "").toLowerCase().split("-")[0];
            if (SUPPORTED.indexOf(norm) >= 0) return norm;
          }
          return "en";
        }
        window.__WMOI_LANG = pick();
        document.write('<script src="../data/lang/content.' + window.__WMOI_LANG + '.js?v=20260613split"><\/script>');
      })();
    </script>
    <script src="../app.min.js?v=20260613min"></script>
